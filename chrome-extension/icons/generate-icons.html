<!DOCTYPE html>
<html>
<head>
  <title>Icon Generator</title>
  <style>
    body { font-family: sans-serif; padding: 20px; }
    canvas { border: 1px solid #ccc; margin: 10px; }
    .icons { display: flex; gap: 20px; flex-wrap: wrap; }
    .icon-container { text-align: center; }
    button { margin: 20px 0; padding: 10px 20px; }
  </style>
</head>
<body>
  <h1>RSS Feed Detector Icon Generator</h1>
  <p>Click the button to download icons. Open this file in a browser.</p>

  <div class="icons">
    <div class="icon-container">
      <canvas id="icon16" width="16" height="16"></canvas>
      <p>16x16</p>
    </div>
    <div class="icon-container">
      <canvas id="icon32" width="32" height="32"></canvas>
      <p>32x32</p>
    </div>
    <div class="icon-container">
      <canvas id="icon48" width="48" height="48"></canvas>
      <p>48x48</p>
    </div>
    <div class="icon-container">
      <canvas id="icon128" width="128" height="128"></canvas>
      <p>128x128</p>
    </div>
  </div>

  <button onclick="downloadAll()">Download All Icons</button>

  <script>
    const sizes = [16, 32, 48, 128];

    function drawIcon(canvas) {
      const ctx = canvas.getContext('2d');
      const size = canvas.width;
      const scale = size / 128;

      // Background circle (RSS orange)
      ctx.fillStyle = '#FF6600';
      ctx.beginPath();
      ctx.arc(size/2, size/2, size/2 - 2*scale, 0, Math.PI * 2);
      ctx.fill();

      // RSS icon elements (white)
      ctx.fillStyle = 'white';
      ctx.strokeStyle = 'white';
      ctx.lineWidth = 8 * scale;

      // Bottom-left dot
      ctx.beginPath();
      ctx.arc(32*scale, 96*scale, 10*scale, 0, Math.PI * 2);
      ctx.fill();

      // First arc
      ctx.beginPath();
      ctx.arc(32*scale, 96*scale, 30*scale, -Math.PI/2, 0);
      ctx.stroke();

      // Second arc
      ctx.beginPath();
      ctx.arc(32*scale, 96*scale, 55*scale, -Math.PI/2, 0);
      ctx.stroke();
    }

    // Draw all icons
    sizes.forEach(size => {
      const canvas = document.getElementById('icon' + size);
      drawIcon(canvas);
    });

    function downloadAll() {
      sizes.forEach(size => {
        const canvas = document.getElementById('icon' + size);
        const link = document.createElement('a');
        link.download = `icon${size}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
      });
    }
  </script>
</body>
</html>
