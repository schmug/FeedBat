<!DOCTYPE html>
<html>
<head>
  <title>FeedBat Icon Generator</title>
  <style>
    body { font-family: sans-serif; padding: 20px; background: #f5f5f5; }
    h1 { color: #5a4fcf; }
    canvas { border: 1px solid #ccc; margin: 10px; background: white; }
    .icons { display: flex; gap: 20px; flex-wrap: wrap; }
    .icon-container { text-align: center; }
    button { margin: 20px 0; padding: 10px 20px; background: #5a4fcf; color: white; border: none; border-radius: 6px; cursor: pointer; }
    button:hover { background: #4a3fbf; }
    .preview { font-size: 64px; margin: 20px 0; }
  </style>
</head>
<body>
  <h1>FeedBat Icon Generator</h1>
  <p>Click the button to download icons. Open this file in a browser.</p>

  <div class="preview">🦇</div>

  <div class="icons">
    <div class="icon-container">
      <canvas id="icon16" width="16" height="16"></canvas>
      <p>16x16</p>
    </div>
    <div class="icon-container">
      <canvas id="icon32" width="32" height="32"></canvas>
      <p>32x32</p>
    </div>
    <div class="icon-container">
      <canvas id="icon48" width="48" height="48"></canvas>
      <p>48x48</p>
    </div>
    <div class="icon-container">
      <canvas id="icon128" width="128" height="128"></canvas>
      <p>128x128</p>
    </div>
  </div>

  <button onclick="downloadAll()">Download All Icons</button>

  <script>
    const sizes = [16, 32, 48, 128];

    function drawIcon(canvas) {
      const ctx = canvas.getContext('2d');
      const size = canvas.width;
      const scale = size / 128;

      // Clear
      ctx.clearRect(0, 0, size, size);

      // Background circle (purple)
      ctx.fillStyle = '#5a4fcf';
      ctx.beginPath();
      ctx.arc(size/2, size/2, size/2 - 1, 0, Math.PI * 2);
      ctx.fill();

      // Draw bat silhouette
      ctx.fillStyle = '#2d2654';

      // Body
      ctx.beginPath();
      ctx.ellipse(size/2, size/2 + 10*scale, 20*scale, 30*scale, 0, 0, Math.PI * 2);
      ctx.fill();

      // Head
      ctx.beginPath();
      ctx.arc(size/2, size/2 - 20*scale, 15*scale, 0, Math.PI * 2);
      ctx.fill();

      // Left ear
      ctx.beginPath();
      ctx.moveTo(size/2 - 10*scale, size/2 - 30*scale);
      ctx.lineTo(size/2 - 20*scale, size/2 - 55*scale);
      ctx.lineTo(size/2 - 5*scale, size/2 - 35*scale);
      ctx.closePath();
      ctx.fill();

      // Right ear
      ctx.beginPath();
      ctx.moveTo(size/2 + 10*scale, size/2 - 30*scale);
      ctx.lineTo(size/2 + 20*scale, size/2 - 55*scale);
      ctx.lineTo(size/2 + 5*scale, size/2 - 35*scale);
      ctx.closePath();
      ctx.fill();

      // Left wing
      ctx.beginPath();
      ctx.moveTo(size/2 - 15*scale, size/2);
      ctx.quadraticCurveTo(size/2 - 55*scale, size/2 - 20*scale, size/2 - 50*scale, size/2 + 20*scale);
      ctx.quadraticCurveTo(size/2 - 40*scale, size/2 + 35*scale, size/2 - 15*scale, size/2 + 25*scale);
      ctx.closePath();
      ctx.fill();

      // Right wing
      ctx.beginPath();
      ctx.moveTo(size/2 + 15*scale, size/2);
      ctx.quadraticCurveTo(size/2 + 55*scale, size/2 - 20*scale, size/2 + 50*scale, size/2 + 20*scale);
      ctx.quadraticCurveTo(size/2 + 40*scale, size/2 + 35*scale, size/2 + 15*scale, size/2 + 25*scale);
      ctx.closePath();
      ctx.fill();

      // Eyes (small white dots)
      ctx.fillStyle = 'white';
      ctx.beginPath();
      ctx.arc(size/2 - 6*scale, size/2 - 22*scale, 3*scale, 0, Math.PI * 2);
      ctx.arc(size/2 + 6*scale, size/2 - 22*scale, 3*scale, 0, Math.PI * 2);
      ctx.fill();
    }

    // Draw all icons
    sizes.forEach(size => {
      const canvas = document.getElementById('icon' + size);
      drawIcon(canvas);
    });

    function downloadAll() {
      sizes.forEach(size => {
        const canvas = document.getElementById('icon' + size);
        const link = document.createElement('a');
        link.download = `icon${size}.png`;
        link.href = canvas.toDataURL('image/png');
        link.click();
      });
    }
  </script>
</body>
</html>
