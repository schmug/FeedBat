<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FeedBat</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <header>
      <div class="header-content">
        <img class="logo" src="assets/baitbat.png" alt="FeedBat">
        <div class="site-info">
          <h1 id="site-name">FeedBat</h1>
          <span id="site-url" class="site-url"></span>
        </div>
        <button id="settings-btn" class="btn-icon settings-btn" title="Settings">⚙️</button>
      </div>
    </header>

    <main>
      <!-- Settings Panel -->
      <div id="settings-panel" class="settings-panel hidden">
        <h2>Settings</h2>

        <div class="setting-item">
          <label>
            <input type="checkbox" id="setting-auto-check" checked>
            <span>Auto-detect feeds on page load</span>
          </label>
        </div>

        <div class="setting-item">
          <label>
            <input type="checkbox" id="setting-show-potential">
            <span>Show potential feed links</span>
          </label>
        </div>

        <div class="setting-item">
          <label>
            <input type="checkbox" id="setting-badge" checked>
            <span>Show badge count</span>
          </label>
        </div>

        <div class="setting-item">
          <label>
            <input type="checkbox" id="setting-probe-common">
            <span>Auto-probe common feed paths</span>
          </label>
        </div>

        <button id="settings-done" class="btn btn-primary">Done</button>
      </div>

      <!-- Main Content -->
      <div id="main-content">
        <div id="loading" class="loading">
          <div class="spinner"></div>
          <span>Detecting feeds...</span>
        </div>

        <div id="no-feeds" class="no-feeds hidden">
          <img class="icon" src="assets/baitbat-empty.png" alt="">
          <p>No feeds detected on this page.</p>
          <button id="check-common" class="btn btn-secondary">Check common paths</button>
        </div>

        <div id="feeds-section" class="feeds-section hidden">
          <h2>Feeds Found</h2>
          <ul id="feeds-list" class="feeds-list"></ul>
        </div>

        <div id="potential-section" class="potential-section hidden">
          <h2>Potential Feeds</h2>
          <p class="hint">These links might be feeds:</p>
          <ul id="potential-list" class="feeds-list"></ul>
        </div>
      </div>
    </main>

    <footer>
      <a href="https://github.com/schmug/FeedBat" target="_blank" class="credit-link">
        FeedBat · a companion to Don't Hype Me
      </a>
    </footer>
  </div>

  <script src="popup.js"></script>
</body>
</html>
